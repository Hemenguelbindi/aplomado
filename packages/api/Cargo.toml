[package]
name = "api"
version = "0.1.0"
edition = "2021"
description = "Server-side API (Dioxus server functions) for Aplomado"
license.workspace = true
repository.workspace = true

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
serde = { workspace = true }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
aplomado-core = { workspace = true, optional = true }
uuid = { workspace = true }
aplomado-types = { workspace = true }
tokio = { version = "1", features = ["rt", "net", "time", "sync"], optional = true }
futures = { version = "0.3", optional = true }

[features]
server = ["dioxus/server", "aplomado-core", "aplomado-core/scanner", "aplomado-core/fingerprint", "aplomado-core/database", "aplomado-core/cve-client", "tokio", "futures"]
