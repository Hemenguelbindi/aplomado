[package]
name = "web"
version = "0.1.0"
edition = "2021"
description = "Aplomado web app (WASM client entry point)"
license.workspace = true
repository.workspace = true

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true }
api = { workspace = true }
aplomado-core = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
serde_json = "1"

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server"]
